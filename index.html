<!doctype html>
<html>
  <head>
    <title> Animal Crossing Recipes </title>
    <!-- <meta name="description" content="A Catalog of Shows Set in Los Angeles" /> -->
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title"> Animal Crossing Kitchen </h1>
    </header>

    <!-- cards formating -->
    <div id="card-container"></div>
    <div class="card" id = "template-card" style="display: none">
      <div class="card-content">
        <h2> Recipe Name</h2>
        <img src="" alt="" />
        <p class = "price"> Price</p>
        <ul class = "ingredients"> </ul>
      </div>
    </div>

    <!-- buttons -->
    <div class="controls">
      <button onclick="showAll()">All</button>
      <button onclick="showOfficial()">Official</button>
      <button onclick="showFanmade()">Fanmade</button>
      <button onclick="removeLastCard()">Remove</button>
    </div>
  </body>
</html>
