<!doctype html>
<html>
  <head>
    <title> Animal Crossing Recipes </title>
    <!-- <meta name="description" content="A Catalog of Shows Set in Los Angeles" /> -->
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title"> Animal Crossing Kitchen </h1>
    </header>

    <!-- buttons -->
    <div class="controls">

      <input
        type = "text"
        placeholder = "Search recipes...."
        oninput="searchRecipes(this.value)"
      />

      <select onchange="sortRecipes(this.value)">
        <option value = ""> Sort by...</option>
        <option value = "name">Name: A to Z</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
      </select>

      <button onclick="showAll()">All</button>
      <button onclick="showOfficial()">Official</button>
      <button onclick="showFanmade()">Fanmade</button>
      <button onclick="removeLastCard()">Remove</button>
    </div>    

    <!-- cards formating -->
    <div id="card-container"></div>
    <div class="card" id = "template-card" style="display: none">
      <div class="card-content">
        <h2> Recipe Name</h2>
        <img src="" alt="" />
        <p class="price">
          <span class="price-value">Price</span>
          <span class="price-unit">Bells</span>
          <img class="bell-icon" src="assets/bell-coin.png" alt="Bell coin icon" />
        </p>
        <p class="description"></p>
        <ul class = "ingredients"> </ul>
      </div>
    </div>

  </body>
</html>
